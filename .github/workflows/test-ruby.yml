name: Ruby SDK

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3', '3.4', '4.0']
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rubocop --parallel
      - run: bundle exec rspec
      - run: ruby -Ilib -e 'require "letmesendemail"; abort unless LetMeSendEmail::VERSION'
      - run: find examples -name '*.rb' -print0 | xargs -0 -n1 ruby -c
      - run: gem build letmesendemail.gemspec

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - run: gem build letmesendemail.gemspec
      - run: gem specification letmesendemail-*.gem --yaml
      - run: gem unpack letmesendemail-*.gem --target pkg/inspection
      - run: find pkg/inspection -type f -print | sort
